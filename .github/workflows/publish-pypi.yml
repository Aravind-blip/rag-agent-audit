name: Publish to PyPI

# Publishes to PyPI when a GitHub Release is published.
# Triggering on the "published" release event (rather than a tag push) prevents
# accidental uploads from draft releases or bare tag creation.
#
# Requires Trusted Publishing to be configured on PyPI:
#   https://pypi.org/manage/project/rag-agent-audit/settings/publishing/
#
# Recommended release workflow:
#   1. Bump version in pyproject.toml, update CHANGELOG, commit, push.
#   2. Create an annotated tag:  git tag -a vX.Y.Z -m "vX.Y.Z"
#   3. Push the tag:             git push origin vX.Y.Z
#   4. On GitHub: Draft → Publish the Release.
#   5. This workflow runs, builds, and uploads to PyPI automatically.

on:
  release:
    types: [published]

permissions:
  contents: read  # minimal default; id-token granted per-job below

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check package metadata (twine)
        run: twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest

    permissions:
      id-token: write  # required for Trusted Publishing / OIDC

    environment:
      name: pypi
      url: https://pypi.org/p/rag-agent-audit

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
