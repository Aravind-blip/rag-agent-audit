name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests

      - name: Run tests
        run: pytest --cov=rag_agent_audit --cov-report=term-missing

  audit-example:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install rag-agent-audit
        run: pip install -e .

      - name: Run example audit (mock mode)
        run: |
          rag-agent-audit run examples/basic/audit.yaml --format markdown --output audit-report.md

      - name: Run example audit (HTTP mode)
        run: |
          python examples/http-endpoint/mock_server.py &
          server_pid=$!
          trap "kill $server_pid" EXIT
          sleep 1
          rag-agent-audit run examples/http-endpoint/audit.yaml

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: audit-report.md
